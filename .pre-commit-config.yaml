repos:
  # -- Secret scanning -------------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  # -- Linting ---------------------------------------------------------------
  - repo: local
    hooks:
      - id: pylint
        name: pylint
        entry: .venv/bin/pylint
        language: system
        types: [python]
        args: [--rcfile=.pylintrc]
        files: ^(src/|main\.py)
