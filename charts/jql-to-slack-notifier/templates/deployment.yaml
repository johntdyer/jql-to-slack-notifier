apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jql-to-slack-notifier.fullname" . }}
  labels:
    {{- include "jql-to-slack-notifier.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "jql-to-slack-notifier.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        # Roll pods when config changes
        checksum/config: {{ .Values.config | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "jql-to-slack-notifier.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ include "jql-to-slack-notifier.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "main.py", "schedule"]
          args: ["--config", "/app/config/queries.yaml"]
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: JIRA_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "jql-to-slack-notifier.secretName" . }}
                  key: JIRA_API_TOKEN
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "jql-to-slack-notifier.secretName" . }}
                  key: SLACK_BOT_TOKEN
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "jql-to-slack-notifier.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
